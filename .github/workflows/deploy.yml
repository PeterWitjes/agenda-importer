name: Deploy naar ai.cpu.nl

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (password)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ai.cpu.nl
          port: 22822
          username: agendastudio
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/domains/agenda.studiocultura.nl/public_html
            git pull origin main
            if [ ! -f vendor/autoload.php ]; then
              php composer.phar install --no-dev --optimize-autoloader 2>/dev/null || true
            fi
            echo "Deploy klaar op $(date)"
